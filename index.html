function populateSelects() {
    // 各部位ごとに防具をフィルタリング
    const headSelect = document.getElementById('head');
    const chestSelect = document.getElementById('chest');
    const waistSelect = document.getElementById('waist');
    const legSelect = document.getElementById('leg');

    const allArmors = Object.keys(armors).sort();

    // 頭（ヘルメット）
    headSelect.innerHTML = '<option value="なし">なし</option>';
    allArmors.forEach(name => {
        if (name.includes('ヘルメット')) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            headSelect.appendChild(opt);
        }
    });

    // 胴（チェストプレート）
    chestSelect.innerHTML = '<option value="なし">なし</option>';
    allArmors.forEach(name => {
        if (name.includes('チェストプレート')) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            chestSelect.appendChild(opt);
        }
    });

    // 腰（レギンス）
    waistSelect.innerHTML = '<option value="なし">なし</option>';
    allArmors.forEach(name => {
        if (name.includes('レギンス')) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            waistSelect.appendChild(opt);
        }
    });

    // 脚（ブーツ）
    legSelect.innerHTML = '<option value="なし">なし</option>';
    allArmors.forEach(name => {
        if (name.includes('ブーツ')) {
            const opt = document.createElement('option');
            opt.value = name;
            opt.textContent = name;
            legSelect.appendChild(opt);
        }
    });
}

function calculate() {
    const slots = {
        head: document.getElementById('head').value,
        chest: document.getElementById('chest').value,
        waist: document.getElementById('waist').value,
        leg: document.getElementById('leg').value
    };

    const total = {};

    Object.values(slots).forEach(armor => {
        if (armor !== "なし" && armors[armor]) {
            Object.entries(armors[armor]).forEach(([skill, point]) => {
                total[skill] = (total[skill] || 0) + point;
            });
        }
    });

    let html = "<h2>発動スキル一覧</h2>";

    if (Object.keys(total).length === 0) {
        html += "<p>防具を選択してください</p>";
    } else {
        Object.entries(total).sort().forEach(([skill, point]) => {
            let status = '';
            if (point >= 10) status = `<span class="active">【発動！】</span>`;
            else if (point <= -10) status = `<span class="negative">【弱体化！】</span>`;
            
            html += `<div class="skill">${skill}： <strong>${point}</strong> ${status}</div>`;
        });
    }

    document.getElementById('result').innerHTML = html;
}

populateSelects();
calculate();
</script>
